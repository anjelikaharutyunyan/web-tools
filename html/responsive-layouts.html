<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Layouts</title>

    <link rel="stylesheet" href="../bootstrap/bootstrap.css" />

    <style>
        body {
            padding: 16px;
        }

        .card {
            max-width: 560px;
            margin: 0 auto;
        }

        .preset {
            cursor: pointer;
        }

        .hint {
            color: #6c757d;
            font-size: 13px;
        }

        code {
            font-size: 12px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="mb-1">Responsive Layouts</h5>
            <div class="hint mb-2">Choose a preset — it will open the same page URL in a new tab and resize the window.
            </div>

            <div class="mb-3">
                <div class="hint">Target URL:</div>
                <code id="targetUrl">loading...</code>
            </div>

            <ul class="list-group" id="presetList"></ul>

            <div class="mt-3 d-flex gap-2 align-items-center">
                <button id="refreshBtn" class="btn btn-sm btn-outline-secondary">Refresh window info</button>
                <div id="winInfo" class="hint"></div>
            </div>
        </div>
    </div>

    <script src="../js/responsiveLayouts.js" defer></script>
</body>

</html>
